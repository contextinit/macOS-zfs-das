<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Security/Encryption Illustration -->
  
  <!-- Background -->
  <defs>
    <linearGradient id="secBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0FDFA;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#secBg)"/>
  
  <!-- Large Shield -->
  <g filter="url(#glow)">
    <path d="M 400 100 L 500 150 L 500 300 Q 500 400 400 500 Q 300 400 300 300 L 300 150 Z" 
          fill="#1E40AF" opacity="0.1"/>
    <path d="M 400 120 L 480 160 L 480 290 Q 480 375 400 465 Q 320 375 320 290 L 320 160 Z" 
          fill="#1E40AF" stroke="#14B8A6" stroke-width="4"/>
  </g>
  
  <!-- Lock Icon on Shield -->
  <g>
    <!-- Lock body -->
    <rect x="370" y="280" width="60" height="70" rx="8" fill="white"/>
    <rect x="375" y="285" width="50" height="60" rx="5" fill="#14B8A6"/>
    
    <!-- Lock shackle -->
    <path d="M 385 280 L 385 260 Q 385 240 400 240 Q 415 240 415 260 L 415 280" 
          stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Keyhole -->
    <circle cx="400" cy="310" r="6" fill="white"/>
    <rect x="397" y="316" width="6" height="15" fill="white"/>
  </g>
  
  <!-- Encryption Keys -->
  <g>
    <!-- Key 1 -->
    <g transform="translate(150, 200)">
      <rect x="0" y="0" width="80" height="30" rx="15" fill="#10B981"/>
      <circle cx="15" cy="15" r="8" fill="white"/>
      <rect x="30" y="10" width="4" height="10" fill="white"/>
      <rect x="38" y="10" width="4" height="10" fill="white"/>
      <rect x="46" y="10" width="4" height="10" fill="white"/>
      <text x="40" y="50" font-family="monospace" font-size="10" fill="#6B7280">AES-256</text>
    </g>
    
    <!-- Key 2 -->
    <g transform="translate(570, 200)">
      <rect x="0" y="0" width="80" height="30" rx="15" fill="#10B981"/>
      <circle cx="15" cy="15" r="8" fill="white"/>
      <rect x="30" y="10" width="4" height="10" fill="white"/>
      <rect x="38" y="10" width="4" height="10" fill="white"/>
      <rect x="46" y="10" width="4" height="10" fill="white"/>
      <text x="40" y="50" font-family="monospace" font-size="10" fill="#6B7280">GCM Mode</text>
    </g>
  </g>
  
  <!-- Data Blocks -->
  <g>
    <!-- Encrypted data blocks -->
    <rect x="200" y="380" width="80" height="60" rx="5" fill="#E5E7EB"/>
    <text x="240" y="415" font-family="monospace" font-size="12" fill="#374151" text-anchor="middle">🔒</text>
    
    <rect x="300" y="380" width="80" height="60" rx="5" fill="#E5E7EB"/>
    <text x="340" y="415" font-family="monospace" font-size="12" fill="#374151" text-anchor="middle">🔒</text>
    
    <rect x="420" y="380" width="80" height="60" rx="5" fill="#E5E7EB"/>
    <text x="460" y="415" font-family="monospace" font-size="12" fill="#374151" text-anchor="middle">🔒</text>
    
    <rect x="520" y="380" width="80" height="60" rx="5" fill="#E5E7EB"/>
    <text x="560" y="415" font-family="monospace" font-size="12" fill="#374151" text-anchor="middle">🔒</text>
  </g>
  
  <!-- Checkmarks -->
  <g>
    <circle cx="240" cy="470" r="12" fill="#10B981"/>
    <path d="M 235 470 L 238 473 L 245 465" stroke="white" stroke-width="2" fill="none"/>
    
    <circle cx="340" cy="470" r="12" fill="#10B981"/>
    <path d="M 335 470 L 338 473 L 345 465" stroke="white" stroke-width="2" fill="none"/>
    
    <circle cx="460" cy="470" r="12" fill="#10B981"/>
    <path d="M 455 470 L 458 473 L 465 465" stroke="white" stroke-width="2" fill="none"/>
    
    <circle cx="560" cy="470" r="12" fill="#10B981"/>
    <path d="M 555 470 L 558 473 L 565 465" stroke="white" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Security text -->
  <text x="400" y="540" font-family="Arial" font-size="18" font-weight="bold" fill="#1E40AF" text-anchor="middle">
    Military-Grade Encryption
  </text>
  <text x="400" y="565" font-family="Arial" font-size="14" fill="#6B7280" text-anchor="middle">
    Your data is protected at rest and in transit
  </text>
</svg>
