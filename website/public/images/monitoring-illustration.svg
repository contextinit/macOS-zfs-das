<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- ZFS Monitoring Dashboard Illustration -->
  
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0FDFA;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Main Dashboard Card -->
  <g filter="url(#shadow)">
    <rect x="100" y="80" width="600" height="440" rx="20" fill="white"/>
  </g>
  
  <!-- Header -->
  <rect x="100" y="80" width="600" height="60" rx="20" fill="url(#primaryGradient)"/>
  <rect x="100" y="120" width="600" height="20" fill="url(#primaryGradient)"/>
  
  <text x="130" y="115" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">
    ZFS Dashboard
  </text>
  
  <!-- Status Indicators -->
  <g>
    <circle cx="600" cy="110" r="8" fill="#10B981"/>
    <text x="615" y="115" font-family="Arial" font-size="14" fill="white">ONLINE</text>
  </g>
  
  <!-- Pool Health Card -->
  <g>
    <rect x="130" y="170" width="250" height="120" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
    <text x="150" y="195" font-family="Arial" font-size="16" font-weight="600" fill="#1F2937">Pool Health</text>
    <circle cx="255" cy="235" r="30" fill="#10B981"/>
    <path d="M 245 235 L 252 242 L 265 228" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="255" y="280" font-family="Arial" font-size="14" fill="#6B7280" text-anchor="middle">100%</text>
  </g>
  
  <!-- Capacity Card -->
  <g>
    <rect x="420" y="170" width="250" height="120" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
    <text x="440" y="195" font-family="Arial" font-size="16" font-weight="600" fill="#1F2937">Capacity</text>
    
    <!-- Progress bar -->
    <rect x="440" y="220" width="210" height="20" rx="10" fill="#E5E7EB"/>
    <rect x="440" y="220" width="95" height="20" rx="10" fill="#14B8A6"/>
    <text x="545" y="262" font-family="Arial" font-size="14" fill="#6B7280" text-anchor="middle">45% Used</text>
  </g>
  
  <!-- Chart Area -->
  <g>
    <rect x="130" y="320" width="540" height="180" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
    <text x="150" y="345" font-family="Arial" font-size="16" font-weight="600" fill="#1F2937">Usage Trend</text>
    
    <!-- Simple line chart -->
    <g stroke="#14B8A6" stroke-width="3" fill="none">
      <polyline points="160,450 220,430 280,440 340,410 400,420 460,400 520,390 580,380 640,370" stroke-linecap="round"/>
    </g>
    
    <!-- Chart points -->
    <g fill="#1E40AF">
      <circle cx="160" cy="450" r="4"/>
      <circle cx="220" cy="430" r="4"/>
      <circle cx="280" cy="440" r="4"/>
      <circle cx="340" cy="410" r="4"/>
      <circle cx="400" cy="420" r="4"/>
      <circle cx="460" cy="400" r="4"/>
      <circle cx="520" cy="390" r="4"/>
      <circle cx="580" cy="380" r="4"/>
      <circle cx="640" cy="370" r="4"/>
    </g>
    
    <!-- Grid lines -->
    <g stroke="#E5E7EB" stroke-width="1" opacity="0.5">
      <line x1="160" y1="360" x2="160" y2="480"/>
      <line x1="280" y1="360" x2="280" y2="480"/>
      <line x1="400" y1="360" x2="400" y2="480"/>
      <line x1="520" y1="360" x2="520" y2="480"/>
      <line x1="640" y1="360" x2="640" y2="480"/>
    </g>
  </g>
  
  <!-- Floating notification badge -->
  <g filter="url(#shadow)">
    <rect x="650" y="30" width="120" height="40" rx="20" fill="white"/>
    <circle cx="675" cy="50" r="6" fill="#10B981"/>
    <text x="685" y="55" font-family="Arial" font-size="12" fill="#1F2937">All Systems OK</text>
  </g>
</svg>
