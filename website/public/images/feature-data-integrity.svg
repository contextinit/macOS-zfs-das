<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Feature Icon - Data Integrity -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="#F9FAFB"/>
  
  <!-- Shield with checkmark -->
  <path d="M 200 50 L 280 90 L 280 180 Q 280 230 200 270 Q 120 230 120 180 L 120 90 Z" 
        fill="url(#grad1)" opacity="0.9"/>
  
  <!-- Checkmark -->
  <path d="M 160 160 L 185 185 L 240 125" stroke="white" stroke-width="12" fill="none" 
        stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Data blocks -->
  <g opacity="0.3">
    <rect x="50" y="220" width="30" height="40" rx="3" fill="#1E40AF"/>
    <rect x="90" y="230" width="30" height="40" rx="3" fill="#1E40AF"/>
    <rect x="280" y="220" width="30" height="40" rx="3" fill="#14B8A6"/>
    <rect x="320" y="230" width="30" height="40" rx="3" fill="#14B8A6"/>
  </g>
</svg>
