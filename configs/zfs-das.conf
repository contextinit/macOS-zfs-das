###############################################################################
# ZFS DAS Configuration File
# 
# Purpose: Central configuration for all ZFS DAS scripts
# Location: /usr/local/etc/zfs-das.conf (or source from project directory)
#
# Instructions:
#   1. Copy this file to /usr/local/etc/zfs-das.conf for system-wide use
#   2. Edit values to match your setup
#   3. Scripts will automatically source this configuration
#
# Author: macOS ZFS DAS Project
# License: MIT
###############################################################################

# ============================================================================
# POOL CONFIGURATION
# ============================================================================

# Primary ZFS pool name
# This is the pool created by create-pool.sh and monitored by all scripts
# Example: media_pool, data_pool, backup_pool
POOL_NAME="media_pool"

# ZFS binary location
# Default installation path for OpenZFS on macOS
ZFS_BIN_PATH="/usr/local/zfs/bin"

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================

# Log directory
LOG_DIR="/var/log"

# Auto-mount log file
AUTOMOUNT_LOG_FILE="${LOG_DIR}/zfs-automount.log"

# Maintenance log file
MAINTENANCE_LOG_FILE="${LOG_DIR}/zfs-maintenance.log"

# Enable debug logging (true/false)
# Set to true for verbose output during troubleshooting
DEBUG_LOGGING=false

# ============================================================================
# AUTO-MOUNT CONFIGURATION
# ============================================================================

# Wait time for DAS to initialize (seconds)
# Increase if your DAS takes longer to be recognized at boot
DAS_INIT_WAIT=10

# Pool import retry attempts
# Number of times to retry pool import if it fails
IMPORT_RETRY_COUNT=3

# Pool import retry delay (seconds)
# Time to wait between retry attempts
IMPORT_RETRY_DELAY=5

# Enable user notifications (true/false)
# Shows macOS notifications for important events
ENABLE_NOTIFICATIONS=true

# ============================================================================
# TIME MACHINE CONFIGURATION
# ============================================================================

# Enable Time Machine auto-mount (true/false)
ENABLE_TIME_MACHINE=true

# Time Machine sparse bundle name
# Format: [ComputerName]-Backup.sparsebundle
# Example: MacMini-Backup.sparsebundle, MacBookPro-Backup.sparsebundle
TM_SPARSE_BUNDLE_NAME="MacMini-Backup.sparsebundle"

# Time Machine dataset path
# Usually: /Volumes/[POOL_NAME]/backups
TM_POOL_PATH="/Volumes/${POOL_NAME}/backups"

# Time Machine volume name (mounted sparse bundle)
# This is what appears in Finder when the sparse bundle is mounted
# Used by SwiftBar monitoring scripts
TM_VOLUME_NAME="MacMini-TM"

# ============================================================================
# MAINTENANCE CONFIGURATION
# ============================================================================

# Enable email notifications (true/false)
ENABLE_EMAIL=false

# Email address for notifications
EMAIL_ADDRESS="you@example.com"

# Email subject prefix
EMAIL_SUBJECT_PREFIX="[ZFS-DAS]"

# SMTP server (if using email)
# Example: smtp.gmail.com:587
SMTP_SERVER=""

# Scrub timeout (minutes)
# Maximum time to wait for scrub to complete (0 = no timeout)
SCRUB_TIMEOUT=1440  # 24 hours

# ============================================================================
# MONITORING CONFIGURATION
# ============================================================================

# SwiftBar plugin directory
SWIFTBAR_PLUGIN_DIR="$HOME/Library/Application Support/SwiftBar/Plugins"

# Monitoring refresh interval (seconds)
MONITOR_REFRESH_INTERVAL=30

# Capacity warning threshold (percentage)
CAPACITY_WARNING=70

# Capacity critical threshold (percentage)
CAPACITY_CRITICAL=85

# Error threshold
# Alert when error count exceeds this value
ERROR_THRESHOLD=10

# Fragmentation warning threshold (percentage)
FRAG_WARNING=30

# Enable capacity trending (true/false)
# Advanced monitoring feature - stores historical data
ENABLE_TRENDING=true

# Trend data cache directory
TREND_CACHE_DIR="$HOME/.zfs-monitor"

# ============================================================================
# ENCRYPTION CONFIGURATION
# ============================================================================

# Encryption key directory
KEY_DIR="/etc/zfs/keys"

# Encryption algorithm
# Options: aes-256-gcm (recommended), aes-256-ccm, aes-128-gcm
ENCRYPTION_ALGORITHM="aes-256-gcm"

# Key format
# Options: raw (recommended), hex, passphrase
KEY_FORMAT="raw"

# Auto-load keys on mount (true/false)
# If true, keys will be loaded automatically from KEY_DIR
AUTO_LOAD_KEYS=true

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================

# ARC (Adaptive Replacement Cache) maximum size (bytes)
# Leave empty to use ZFS defaults
# Example: 8589934592 (8GB), 17179869184 (16GB)
ARC_MAX_SIZE=""

# Compression algorithm
# Options: lz4 (recommended), gzip, zstd, off
COMPRESSION_ALGO="lz4"

# ATime updates (on/off)
# Set to 'off' for better performance (recommended)
ATIME="off"

# Record size (bytes)
# Default: 128K, good for most workloads
# Options: 4K, 8K, 16K, 32K, 64K, 128K, 256K, 512K, 1M
RECORDSIZE="128K"

# ============================================================================
# ADVANCED OPTIONS
# ============================================================================

# Enable ZFS autotrim (true/false)
# Only useful for SSD-based pools
ENABLE_AUTOTRIM=false

# ZFS auto-snapshot prefix
# Used if you implement zfs-auto-snapshot
SNAPSHOT_PREFIX="auto"

# Snapshot retention policy
# Format: frequent=4,hourly=24,daily=7,weekly=4,monthly=12
SNAPSHOT_RETENTION="daily=7,weekly=4,monthly=6"

# Enable deduplication (true/false)
# WARNING: Requires significant RAM (5GB per TB of data)
# Only enable if you understand the resource requirements
ENABLE_DEDUP=false

# Custom mount options
# Additional options to pass to zfs mount
# Example: "-o noexec,nosuid"
CUSTOM_MOUNT_OPTS=""

# ============================================================================
# NOTIFICATION SETTINGS
# ============================================================================

# Notification sound (macOS)
# Options: Basso, Blow, Bottle, Frog, Funk, Glass, Hero, Morse, Ping, Pop, 
#          Purr, Sosumi, Submarine, Tink
NOTIFICATION_SOUND="Basso"

# Notification duration (seconds)
# How long notification stays on screen
NOTIFICATION_DURATION=5

# ============================================================================
# END OF CONFIGURATION
# ============================================================================

# Validation function (called by scripts)
validate_config() {
    local errors=0
    
    # Check required variables
    if [ -z "$POOL_NAME" ]; then
        echo "ERROR: POOL_NAME is not set" >&2
        errors=$((errors + 1))
    fi
    
    if [ -z "$ZFS_BIN_PATH" ]; then
        echo "ERROR: ZFS_BIN_PATH is not set" >&2
        errors=$((errors + 1))
    fi
    
    # Validate threshold values
    if [ "$CAPACITY_WARNING" -ge "$CAPACITY_CRITICAL" ]; then
        echo "WARNING: CAPACITY_WARNING should be less than CAPACITY_CRITICAL" >&2
    fi
    
    return $errors
}

# Export all variables for child processes
export POOL_NAME ZFS_BIN_PATH
export LOG_DIR AUTOMOUNT_LOG_FILE MAINTENANCE_LOG_FILE DEBUG_LOGGING
export DAS_INIT_WAIT IMPORT_RETRY_COUNT IMPORT_RETRY_DELAY ENABLE_NOTIFICATIONS
export ENABLE_TIME_MACHINE TM_SPARSE_BUNDLE_NAME TM_POOL_PATH TM_VOLUME_NAME
export ENABLE_EMAIL EMAIL_ADDRESS EMAIL_SUBJECT_PREFIX SMTP_SERVER SCRUB_TIMEOUT
export SWIFTBAR_PLUGIN_DIR MONITOR_REFRESH_INTERVAL
export CAPACITY_WARNING CAPACITY_CRITICAL ERROR_THRESHOLD FRAG_WARNING
export ENABLE_TRENDING TREND_CACHE_DIR
export KEY_DIR ENCRYPTION_ALGORITHM KEY_FORMAT AUTO_LOAD_KEYS
export ARC_MAX_SIZE COMPRESSION_ALGO ATIME RECORDSIZE
export ENABLE_AUTOTRIM SNAPSHOT_PREFIX SNAPSHOT_RETENTION ENABLE_DEDUP CUSTOM_MOUNT_OPTS
export NOTIFICATION_SOUND NOTIFICATION_DURATION
